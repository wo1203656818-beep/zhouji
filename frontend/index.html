  <!-- 部署配置 -->
  <script>
    window.__DEPLOY_CONFIG__ = {
      API_BASE_URL: 'https://zhouji-api.wo1203656818.workers.dev'
    };
    window.escapeHtml = function(str) {
      if (!str && str !== 0) return '';
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(String(str)));
      return d.innerHTML;
    };
  </script>

  <!-- Tailwind CSS -->
  <script>
    window.__tailwind_config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6366F1',
            secondary: '#10B981',
            accent: '#F59E0B',
            danger: '#EF4444'
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (typeof tailwind !== 'undefined' && tailwind.config) {
      tailwind.config = window.__tailwind_config;
    }
  </script>

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- 核心样式表 -->
  <link rel="stylesheet" href="styles.css">

  <!-- 额外全局样式 -->
  <style>
    /* 移动端关键修复：使用 dvh 防止键盘弹出时页面重排导致输入框失焦 */
    html, body { min-height: 100dvh; min-height: -webkit-fill-available; }
    .min-h-screen { min-height: 100dvh !important; min-height: -webkit-fill-available !important; }
    /* 防止 iOS 输入框自动缩放导致焦点丢失 */
    input[type="text"], input[type="password"], input[type="email"], textarea, select.form-input {
      font-size: 16px !important;
      -webkit-user-select: text;
      user-select: text;
      touch-action: manipulation;
    }
    /* 修复 iOS PWA 安全区域 */
    body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    .touch-btn { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .card-modern { transition: all 0.2s ease; }
    .dark body { background: #0F172A; }
  </style>

  <!-- 提前设置深色模式，防止闪烁 -->
  <script>
    (function() {
      try {
        var dark = localStorage.getItem('dark_mode') === 'true';
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) {}
    })();
  </script>
  
  <link rel="manifest" href="/manifest.json">
  <!-- SheetJS (xlsx) 用于导出 Excel 文件 -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
</head>
<body class="text-gray-800 dark:text-gray-100 min-h-screen transition-colors duration-300">
  <noscript>
    <div style="padding: 2rem; text-align: center; font-family: system-ui, sans-serif;">
      <div style="width: 64px; height: 64px; margin: 0 auto 1rem; background: #4F46E5; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; font-weight: bold;">周</div>
      <h1 style="color: #1f2937; font-size: 1.5rem; margin-bottom: 0.5rem;">周迹</h1>
      <p style="color: #6b7280; margin-bottom: 0.5rem;">请启用 JavaScript 以使用周迹系统。</p>
      <p style="color: #9ca3af; font-size: 0.875rem;">周迹是一款基于浏览器的拖延症干预工具，需要 JavaScript 支持。</p>
    </div>
  </noscript>
  
  <div id="app"></div>
  
  <div id="loading" class="loading-overlay hidden">
    <div class="flex flex-col items-center gap-3">
      <div class="w-10 h-10 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
      <p class="text-sm text-gray-500 dark:text-gray-400">加载中...</p>
    </div>
  </div>

  <!-- 加载外部JavaScript文件... -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="diary.js?v=202606282245"></script>
  <script src="stats.js?v=202606282245"></script>
  <script src="assistant.js?v=202606282245"></script>
  <script src="social.js?v=202606282245"></script>

  <script src="app.js?v=202606282245"></script>
  
  <!-- PWA更新检测 -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(function(reg) {
        reg.addEventListener('updatefound', function() {
          var newSW = reg.installing;
          newSW.addEventListener('statechange', function() {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              var div = document.createElement('div');
              div.id = 'sw-update-banner';
              div.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:#6366f1;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;box-shadow:0 4px 20px rgba(99,102,241,0.4);display:flex;align-items:center;gap:12px;cursor:pointer;max-width:90%;';
              div.innerHTML = '<span>' + icon('sync-alt') + ' 新版本可用，点击刷新</span><span style="font-size:18px;opacity:0.7;">×</span>';
              div.onclick = function() { window.location.reload(); };
              document.body.appendChild(div);
              setTimeout(function() { if (div.parentNode) div.parentNode.removeChild(div); }, 15000);
            }
          });
        });
      }).catch(function() {});
    }
    function icon(n) { return '<i class="fas fa-' + n + '"></i>'; }
  </script>
  
  <script>
    // 全局错误处理
    window.onerror = function(msg, url, line, col, error) {
      var app = document.getElementById('app');
      if (app) {
        // 修复: 使用 textContent 而非 innerHTML，防止 XSS
        var div = document.createElement('div');
        div.style.cssText = 'padding:2rem;text-align:center;font-family:sans-serif;';
        div.innerHTML = '<h1 style="color:#EF4444;">❌ JavaScript错误</h1>';
        var p1 = document.createElement('p');
        p1.style.cssText = 'color:#666;margin:1rem 0;';
        p1.textContent = msg || '未知错误';
        div.appendChild(p1);
        var p2 = document.createElement('p');
        p2.style.cssText = 'color:#999;font-size:12px;';
        p2.textContent = '位置: ' + (url || '') + ' 第' + (line || '?') + '行';
        div.appendChild(p2);
        var btn = document.createElement('button');
        btn.onclick = function() { location.reload(); };
        btn.style.cssText = 'margin-top:1rem;padding:0.5rem 1rem;background:#4F46E5;color:white;border:none;border-radius:0.5rem;cursor:pointer;';
        btn.textContent = '刷新重试';
        div.appendChild(btn);
        app.innerHTML = '';
        app.appendChild(div);
      }
      console.error('Global error:', msg, 'at', url, 'line:', line);
      return false;
    };
    
    // 超时检测
    setTimeout(function() {
      var app = document.getElementById('app');
      if (app && (!app.innerHTML || app.innerHTML.trim() === '')) {
        var div = document.createElement('div');
        div.style.cssText = 'padding:2rem;text-align:center;font-family:sans-serif;';
        div.innerHTML = '<h1 style="color:#F59E0B;">⏳ 页面加载超时</h1>';
        var p = document.createElement('p');
        p.style.cssText = 'color:#666;margin:1rem 0;';
        p.textContent = '可能的原因：\n1. JavaScript执行错误\n2. API服务器无响应\n3. 网络连接问题';
        div.appendChild(p);
        var btn = document.createElement('button');
        btn.onclick = function() { location.reload(); };
        btn.style.cssText = 'margin-top:1rem;padding:0.5rem 1rem;background:#4F46E5;color:white;border:none;border-radius:0.5rem;cursor:pointer;';
        btn.textContent = '刷新重试';
        div.appendChild(btn);
        app.innerHTML = '';
        app.appendChild(div);
      }
    }, 5000);
  </script>
