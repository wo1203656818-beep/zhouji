name = "zhouji-api"
main = "index.js"
compatibility_date = "2026-06-06"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "zhouji-db"
database_id = "75ec6cc9-f215-40a5-812d-83cc30f88293"

[vars]
NODE_ENV = "production"
# JWT_SECRET 请使用 wrangler secret put JWT_SECRET 设置，不要明文写在 toml 中
# 首次部署执行: wrangler secret put JWT_SECRET
# 输入一个至少32位的随机字符串作为密钥
