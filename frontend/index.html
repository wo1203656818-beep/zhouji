<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4F46E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="周迹 - 拖延症干预系统，基于CBT认知行为疗法的任务拆解和情绪管理工具。不是管理时间，是管理启动。">
  <meta name="keywords" content="拖延症,时间管理,CBT,番茄钟,任务拆解,情绪管理,productivity">
  <meta name="author" content="周迹">
  <meta name="robots" content="index, follow">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%234F46E5' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-family='serif'%3E周%3C/text%3E%3C/svg%3E">
  <title>周迹 - 不是管理时间，是管理启动 v2.4</title>
  
  <!-- 部署配置 -->
  <script>
    window.__DEPLOY_CONFIG__ = {
      API_BASE_URL: 'https://zhouji-api.wo1203656818.workers.dev'
    };
    // 全局 HTML 转义函数（所有 JS 文件之前定义，用于 XSS 防护）
    window.escapeHtml = function(str) {
      if (!str && str !== 0) return '';
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(String(str)));
      return d.innerHTML;
    };
  </script>
  
  <!-- Tailwind CSS (config 必须在 CDN 之前定义) -->
  <script>
    // 修复: tailwind.config 必须在 cdn.tailwindcss.com 加载之前定义
    // 否则 "tailwind is not defined" 报错
    window.__tailwind_config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',
            secondary: '#10B981',
            accent: '#F59E0B',
            danger: '#EF4444',
            warm: '#F97316',
            calm: '#3B82F6',
            surface: '#F8FAFC',
            'surface-dark': '#1E293B'
          }
        }
      }
    };
    // 兼容 cdn.tailwindcss.com 的两种加载方式
    if (typeof tailwind !== 'undefined' && tailwind.config) {
      tailwind.config = window.__tailwind_config;
    }
  </script>
  <script>
    // 为 cdn.tailwindcss.com 提供 tailwind 全局变量
    // 某些版本的 CDN Play 脚本需要 tailwind 全局已存在
    window.tailwind = window.tailwind || { config: window.__tailwind_config };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // CDN 加载后的二次确认
    if (typeof tailwind !== 'undefined' && tailwind.config !== window.__tailwind_config) {
      tailwind.config = window.__tailwind_config;
    } else if (typeof tailwind === 'undefined') {
      console.warn('Tailwind CSS CDN 加载失败，使用备用样式');
    }
  </script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 自定义样式 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans SC', sans-serif; overscroll-behavior-y: none; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .pulse-soft { animation: pulseSoft 2s infinite; }
    @keyframes pulseSoft { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .timer-circle { transition: stroke-dashoffset 1s linear; }
    .gradient-text { background: linear-gradient(135deg, #4F46E5, #10B981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); }
    .dark .glass { background: rgba(30,41,59,0.85); }
    .step-card { transition: all 0.25s cubic-bezier(0.4,0,0.2,1); }
    .step-card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px -8px rgba(0,0,0,0.12); }
    .emotion-btn { transition: all 0.2s cubic-bezier(0.4,0,0.2,1); }
    .emotion-btn:hover { transform: scale(1.04); }
    .emotion-btn.selected { ring: 2px; ring-offset: 2px; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #64748B; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .dark .loading-overlay { background: rgba(15,23,42,0.8); }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; }
    @keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .dark .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; }
    .pomodoro-active { animation: pomodoroPulse 1s infinite; }
    @keyframes pomodoroPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); } }
    .pomodoro-break { animation: breakPulse 1s infinite; }
    @keyframes breakPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); } 50% { box-shadow: 0 0 0 12px rgba(16,185,129,0); } }
    .touch-btn { min-height: 44px; min-width: 44px; }
    .modal-backdrop { animation: modalFade 0.2s ease-out; }
    @keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
    .modal-content { animation: modalSlide 0.25s cubic-bezier(0.4,0,0.2,1); }
    @keyframes modalSlide { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  </style>

  <!-- 提前设置深色模式，防止闪烁 -->
  <script>
    (function() {
      try {
        var dark = localStorage.getItem('dark_mode') === 'true';
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) {}
    })();
  </script>
  
  <link rel="manifest" href="/manifest.json">
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">
  <noscript>
    <div style="padding: 2rem; text-align: center; font-family: system-ui, sans-serif;">
      <div style="width: 64px; height: 64px; margin: 0 auto 1rem; background: #4F46E5; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; font-weight: bold;">周</div>
      <h1 style="color: #1f2937; font-size: 1.5rem; margin-bottom: 0.5rem;">周迹</h1>
      <p style="color: #6b7280; margin-bottom: 0.5rem;">请启用 JavaScript 以使用周迹系统。</p>
      <p style="color: #9ca3af; font-size: 0.875rem;">周迹是一款基于浏览器的拖延症干预工具，需要 JavaScript 支持。</p>
    </div>
  </noscript>
  
  <div id="app"></div>
  
  <div id="loading" class="loading-overlay hidden">
    <div class="flex flex-col items-center gap-3">
      <div class="w-10 h-10 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
      <p class="text-sm text-gray-500 dark:text-gray-400">加载中...</p>
    </div>
  </div>

  <!-- 加载外部JavaScript文件：先加载依赖，再加载主应用 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="diary.js"></script>
  <script src="stats.js"></script>
  <script src="assistant.js"></script>
  <script src="achievement.js"></script>
  <script src="social.js"></script>
  <script src="app.js"></script>
  
  <script>
    // 全局错误处理
    window.onerror = function(msg, url, line, col, error) {
      var app = document.getElementById('app');
      if (app) {
        // 修复: 使用 textContent 而非 innerHTML，防止 XSS
        var div = document.createElement('div');
        div.style.cssText = 'padding:2rem;text-align:center;font-family:sans-serif;';
        div.innerHTML = '<h1 style="color:#EF4444;">❌ JavaScript错误</h1>';
        var p1 = document.createElement('p');
        p1.style.cssText = 'color:#666;margin:1rem 0;';
        p1.textContent = msg || '未知错误';
        div.appendChild(p1);
        var p2 = document.createElement('p');
        p2.style.cssText = 'color:#999;font-size:12px;';
        p2.textContent = '位置: ' + (url || '') + ' 第' + (line || '?') + '行';
        div.appendChild(p2);
        var btn = document.createElement('button');
        btn.onclick = function() { location.reload(); };
        btn.style.cssText = 'margin-top:1rem;padding:0.5rem 1rem;background:#4F46E5;color:white;border:none;border-radius:0.5rem;cursor:pointer;';
        btn.textContent = '刷新重试';
        div.appendChild(btn);
        app.innerHTML = '';
        app.appendChild(div);
      }
      console.error('Global error:', msg, 'at', url, 'line:', line);
      return false;
    };
    
    // 超时检测
    setTimeout(function() {
      var app = document.getElementById('app');
      if (app && (!app.innerHTML || app.innerHTML.trim() === '')) {
        var div = document.createElement('div');
        div.style.cssText = 'padding:2rem;text-align:center;font-family:sans-serif;';
        div.innerHTML = '<h1 style="color:#F59E0B;">⏳ 页面加载超时</h1>';
        var p = document.createElement('p');
        p.style.cssText = 'color:#666;margin:1rem 0;';
        p.textContent = '可能的原因：\n1. JavaScript执行错误\n2. API服务器无响应\n3. 网络连接问题';
        div.appendChild(p);
        var btn = document.createElement('button');
        btn.onclick = function() { location.reload(); };
        btn.style.cssText = 'margin-top:1rem;padding:0.5rem 1rem;background:#4F46E5;color:white;border:none;border-radius:0.5rem;cursor:pointer;';
        btn.textContent = '刷新重试';
        div.appendChild(btn);
        app.innerHTML = '';
        app.appendChild(div);
      }
    }, 5000);
  </script>
</body>
</html>
