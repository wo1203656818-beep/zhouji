name = "zhouji-api"
main = "index.js"
compatibility_date = "2026-06-06"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "zhouji-db"
database_id = "75ec6cc9-f215-40a5-812d-83cc30f88293"

[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "zhouji-attachments"

[[kv_namespaces]]
binding = "CACHE"
id = "59e5276948844ded8ac8b7119c59d50d"
preview_id = "f25ac7da08df42389fc46a0a2edbc70c"

[vars]
NODE_ENV = "production"
FRONTEND_URL = "https://zhouji-frontend.pages.dev"
# 百度网盘配置请使用 wrangler secret put:
#   wrangler secret put BAIDU_APP_KEY
#   wrangler secret put BAIDU_SECRET_KEY
# JWT_SECRET 请使用 wrangler secret put JWT_SECRET 设置
